value = { fg = "#abb2bf" }
selected = { bg = "#393f4a" }

[cmp]
border = { fg = "#3b3f4c" }
active = { fg = "#abb2bf", bg = "#393f4a" }
inactive = { fg = "#5c6370" }

[tasks]
