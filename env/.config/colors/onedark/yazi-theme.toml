[mgr]
cwd = { fg = "#848b98" }

hovered = { bg = "#393f4a" }
preview_hovered = { bg = "#393f4a" }

find_keyword = { fg = "#21252b", bg = "#e5c07b", bold = true }
find_position = { fg = "#61afef", bg = "#21252b", bold = true }

marker_copied = { fg = "#98c379", bg = "#98c379" }
marker_cut = { fg = "#e86671", bg = "#e86671" }
marker_marked = { fg = "#c678dd", bg = "#c678dd" }
marker_selected = { fg = "#61afef", bg = "#61afef" }

border_symbol = "│"
border_style = { fg = "#3b3f4c" }

[tabs]
active = { fg = "#21252b", bg = "#61afef", bold = true }
inactive = { fg = "#61afef", bg = "#282c34" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#21252b", bg = "#61afef", bold = true }
normal_alt = { fg = "#61afef", bg = "#21252b" }

select_main = { fg = "#21252b", bg = "#c678dd", bold = true }
select_alt = { fg = "#c678dd", bg = "#21252b" }

unset_main = { fg = "#21252b", bg = "#56b6c2", bold = true }
unset_alt = { fg = "#56b6c2", bg = "#21252b" }

[indicator]
parent = { fg = "#5c6370" }
current = { bg = "#393f4a", bold = true }
preview = { fg = "#5c6370" }
padding = { open = " ", close = " " }

[status]
overall = { fg = "#abb2bf", bg = "#282c34" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

progress_label = { fg = "#abb2bf", bold = true }
progress_normal = { fg = "#56b6c2", bg = "#393f4a" }
progress_error = { fg = "#e86671", bg = "#393f4a" }

perm_sep = { fg = "#3b3f4c" }
