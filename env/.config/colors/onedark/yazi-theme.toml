perm_read = { fg = "#d19a66" }
perm_write = { fg = "#e86671" }
perm_exec = { fg = "#98c379" }

[which]
cols = 3
mask = { bg = "#21252b" }
cand = { fg = "#61afef" }
rest = { fg = "#848b98" }
desc = { fg = "#848b98" }
separator = "  "
separator_style = { fg = "#3b3f4c" }

[confirm]
border = { fg = "#3b3f4c" }
title = { fg = "#61afef" }
btn_yes = { fg = "#21252b", bg = "#98c379", bold = true }
btn_no = { fg = "#abb2bf", bg = "#393f4a" }
btn_labels = [ "  Yes  ", "  No  " ]

[spot]
border = { fg = "#3b3f4c" }

[notify]
title_info = { fg = "#61afef" }
title_warn = { fg = "#d19a66" }
title_error = { fg = "#e86671" }
icon_info = ""
icon_warn = ""
icon_error = ""

[pick]
border = { fg = "#3b3f4c" }
active = { fg = "#abb2bf", bg = "#393f4a" }
inactive = { fg = "#5c6370" }

[input]
border = { fg = "#3b3f4c" }
