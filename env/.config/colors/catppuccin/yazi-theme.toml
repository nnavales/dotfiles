[mgr]
cwd = { fg = "#bac2de" }

hovered = { bg = "#313244" }
preview_hovered = { bg = "#313244" }

find_keyword = { fg = "#181825", bg = "#f9e2af", bold = true }
find_position = { fg = "#89b4fa", bg = "#181825", bold = true }

marker_copied = { fg = "#a6e3a1", bg = "#a6e3a1" }
marker_cut = { fg = "#f38ba8", bg = "#f38ba8" }
marker_marked = { fg = "#cba6f7", bg = "#cba6f7" }
marker_selected = { fg = "#89b4fa", bg = "#89b4fa" }

border_symbol = "│"
border_style = { fg = "#45475a" }

[tabs]
active = { fg = "#181825", bg = "#89b4fa", bold = true }
inactive = { fg = "#89b4fa", bg = "#1e1e2e" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#181825", bg = "#89b4fa", bold = true }
normal_alt = { fg = "#89b4fa", bg = "#181825" }

select_main = { fg = "#181825", bg = "#cba6f7", bold = true }
select_alt = { fg = "#cba6f7", bg = "#181825" }

unset_main = { fg = "#181825", bg = "#94e2d5", bold = true }
unset_alt = { fg = "#94e2d5", bg = "#181825" }

[indicator]
parent = { fg = "#6c7086" }
current = { bg = "#45475a", bold = true }
preview = { fg = "#6c7086" }
padding = { open = " ", close = " " }

[status]
overall = { fg = "#cdd6f4", bg = "#1e1e2e" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

progress_label = { fg = "#cdd6f4", bold = true }
progress_normal = { fg = "#94e2d5", bg = "#313244" }
progress_error = { fg = "#f38ba8", bg = "#313244" }

perm_sep = { fg = "#45475a" }
perm_type = { fg = "#94e2d5" }
perm_read = { fg = "#fab387" }
perm_write = { fg = "#f38ba8" }
perm_exec = { fg = "#a6e3a1" }

[which]
cols = 3
mask = { bg = "#11111b" }
cand = { fg = "#89b4fa" }
rest = { fg = "#7f849c" }
desc = { fg = "#bac2de" }
separator = "  "
separator_style = { fg = "#45475a" }

[confirm]
border = { fg = "#45475a" }
title = { fg = "#89b4fa" }
btn_yes = { fg = "#181825", bg = "#a6e3a1", bold = true }
btn_no = { fg = "#cdd6f4", bg = "#313244" }
btn_labels = [ "  Yes  ", "  No  " ]

[spot]
border = { fg = "#45475a" }

[notify]
title_info = { fg = "#89b4fa" }
title_warn = { fg = "#fab387" }
title_error = { fg = "#f38ba8" }
icon_info = ""
icon_warn = ""
icon_error = ""

[pick]
border = { fg = "#45475a" }
active = { fg = "#cdd6f4", bg = "#45475a" }
inactive = { fg = "#7f849c" }

[input]
border = { fg = "#45475a" }
title = { fg = "#89b4fa" }
value = { fg = "#cdd6f4" }
selected = { bg = "#45475a" }

[cmp]
border = { fg = "#45475a" }
active = { fg = "#cdd6f4", bg = "#45475a" }
inactive = { fg = "#7f849c" }

[tasks]
border = { fg = "#45475a" }
hovered = { fg = "#cdd6f4", bg = "#313244" }

[help]
on = { fg = "#a6e3a1" }
run = { fg = "#cba6f7" }
desc = { fg = "#bac2de" }
hovered = { bg = "#313244" }
footer = { fg = "#7f849c", bg = "#181825" }

