set -g status-justify left
set -g status-style "fg=#D3C6AA,bg=#343F44"
set -g pane-border-style "fg=#7A8478"
set -g pane-active-border-style "fg=#343F44"
set -g message-style "fg=#D3C6AA,bg=#343F44,bold"
set -g message-command-style "fg=#D3C6AA,bg=#343F44,bold"
set -g mode-style "bg=#543A48"
set -g window-status-separator ""
set -g window-status-style "fg=#7A8478"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W* "
set -g window-status-current-style "fg=#D3C6AA,bold"
set -g status-left ""
set -g status-right "#[fg=#D3C6AA,bold] #S"
setw -g clock-mode-colour "#7A8478"
