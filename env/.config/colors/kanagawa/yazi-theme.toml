[mgr]
cwd = { fg = "#C8C093" }

hovered = { bg = "#2A2A37" }
preview_hovered = { bg = "#2A2A37" }

find_keyword = { fg = "#16161D", bg = "#C0A36E", bold = true }
find_position = { fg = "#7E9CD8", bg = "#16161D", bold = true }

marker_copied = { fg = "#98BB6C", bg = "#98BB6C" }
marker_cut = { fg = "#C34043", bg = "#C34043" }
marker_marked = { fg = "#957FB8", bg = "#957FB8" }
marker_selected = { fg = "#7E9CD8", bg = "#7E9CD8" }

border_symbol = "│"
border_style = { fg = "#54546D" }

[tabs]
active = { fg = "#16161D", bg = "#7E9CD8", bold = true }
inactive = { fg = "#7E9CD8", bg = "#2A2A37" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#16161D", bg = "#7E9CD8", bold = true }
normal_alt = { fg = "#7E9CD8", bg = "#2A2A37" }

select_main = { fg = "#16161D", bg = "#957FB8", bold = true }
select_alt = { fg = "#957FB8", bg = "#2A2A37" }

unset_main = { fg = "#16161D", bg = "#7AA89F", bold = true }
unset_alt = { fg = "#7AA89F", bg = "#2A2A37" }

[indicator]
parent = { fg = "#727169" }
current = { bg = "#2D4F67", bold = true }
preview = { fg = "#727169" }
padding = { open = " ", close = " " }

[status]
overall = { fg = "#DCD7BA", bg = "#16161D" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

progress_label = { fg = "#DCD7BA", bold = true }
progress_normal = { fg = "#7AA89F", bg = "#2A2A37" }
progress_error = { fg = "#C34043", bg = "#2A2A37" }

perm_sep = { fg = "#54546D" }
perm_type = { fg = "#7AA89F" }
perm_read = { fg = "#C0A36E" }
perm_write = { fg = "#C34043" }
perm_exec = { fg = "#98BB6C" }

[which]
cols = 3
mask = { bg = "#16161D" }
cand = { fg = "#7E9CD8" }
rest = { fg = "#727169" }
desc = { fg = "#C8C093" }
separator = "  "
separator_style = { fg = "#54546D" }

[confirm]
border = { fg = "#54546D" }
title = { fg = "#7E9CD8" }
btn_yes = { fg = "#16161D", bg = "#98BB6C", bold = true }
btn_no = { fg = "#DCD7BA", bg = "#2A2A37" }
btn_labels = [ "  Yes  ", "  No  " ]

[spot]
border = { fg = "#54546D" }

[notify]
title_info = { fg = "#7E9CD8" }
title_warn = { fg = "#C0A36E" }
title_error = { fg = "#C34043" }
icon_info = ""
icon_warn = ""
icon_error = ""

[pick]
border = { fg = "#54546D" }
active = { fg = "#DCD7BA", bg = "#2D4F67" }
inactive = { fg = "#727169" }

[input]
border = { fg = "#54546D" }
title = { fg = "#7E9CD8" }
value = { fg = "#DCD7BA" }
selected = { bg = "#2D4F67" }

[cmp]
border = { fg = "#54546D" }
active = { fg = "#DCD7BA", bg = "#2D4F67" }
inactive = { fg = "#727169" }

[tasks]
border = { fg = "#54546D" }
hovered = { fg = "#DCD7BA", bg = "#2A2A37" }

[help]
on = { fg = "#98BB6C" }
run = { fg = "#957FB8" }
desc = { fg = "#C8C093" }
hovered = { bg = "#2A2A37" }
footer = { fg = "#727169", bg = "#16161D" }

