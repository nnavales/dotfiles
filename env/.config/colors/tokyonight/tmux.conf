set -g status-justify left
set -g status-style "fg=#C0CAF5,bg=#292E42"
set -g pane-border-style "fg=#545C7E"
set -g pane-active-border-style "fg=#292E42"
set -g message-style "fg=#C0CAF5,bg=#292E42,bold"
set -g message-command-style "fg=#C0CAF5,bg=#292E42,bold"
set -g mode-style "bg=#283457"
set -g window-status-separator ""
set -g window-status-style "fg=#545C7E"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W* "
set -g window-status-current-style "fg=#C0CAF5,bold"
set -g status-left ""
set -g status-right "#[fg=#C0CAF5,bold] #S"
setw -g clock-mode-colour "#545C7E"
