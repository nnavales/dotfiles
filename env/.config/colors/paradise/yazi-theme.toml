[mgr]
cwd = { fg = "#B8D3D5" }

hovered = { bg = "#1F2428" }
preview_hovered = { bg = "#1F2428" }

find_keyword = { fg = "#181A1C", bg = "#E4C56B", bold = true }
find_position = { fg = "#A1DEEA", bg = "#1B1F23", bold = true }

marker_copied = { fg = "#5FC878", bg = "#5FC878" }
marker_cut = { fg = "#E66B80", bg = "#E66B80" }
marker_marked = { fg = "#B895DE", bg = "#B895DE" }
marker_selected = { fg = "#A1DEEA", bg = "#A1DEEA" }

border_symbol = "тФВ"
border_style = { fg = "#33383D" }

[tabs]
active = { fg = "#181A1C", bg = "#A1DEEA", bold = true }
inactive = { fg = "#A1DEEA", bg = "#1E2124" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#181A1C", bg = "#A1DEEA", bold = true }
normal_alt = { fg = "#A1DEEA", bg = "#1B1F23" }

select_main = { fg = "#181A1C", bg = "#B895DE", bold = true }
select_alt = { fg = "#B895DE", bg = "#1B1F23" }

unset_main = { fg = "#181A1C", bg = "#5FD3BB", bold = true }
unset_alt = { fg = "#5FD3BB", bg = "#1B1F23" }

[indicator]
parent = { fg = "#4B5B63" }
current = { bg = "#33383D", bold = true }
preview = { fg = "#4B5B63" }
padding = { open = " ", close = " " }

[status]
overall = { fg = "#DCE5E5", bg = "#1E2124" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

progress_label = { fg = "#DCE5E5", bold = true }
progress_normal = { fg = "#5FD3BB", bg = "#1F2428" }
progress_error = { fg = "#E66B80", bg = "#1F2428" }

perm_sep = { fg = "#33383D" }
perm_type = { fg = "#5FD3BB" }
perm_read = { fg = "#ECA25C" }
perm_write = { fg = "#E66B80" }
perm_exec = { fg = "#5FC878" }

[which]
cols = 3
mask = { bg = "#131416" }
cand = { fg = "#A1DEEA" }
rest = { fg = "#789AA1" }
desc = { fg = "#B8D3D5" }
separator = "  "
separator_style = { fg = "#33383D" }

[confirm]
border = { fg = "#33383D" }
title = { fg = "#A1DEEA" }
btn_yes = { fg = "#181A1C", bg = "#5FC878", bold = true }
btn_no = { fg = "#DCE5E5", bg = "#282B2F" }
btn_labels = [ "  Yes  ", "  No  " ]

[spot]
border = { fg = "#33383D" }

[notify]
title_info = { fg = "#A1DEEA" }
title_warn = { fg = "#ECA25C" }
title_error = { fg = "#E66B80" }
icon_info = "яБЪ"
icon_warn = "яБ▒"
icon_error = "яБЧ"

[pick]
border = { fg = "#33383D" }
active = { fg = "#DCE5E5", bg = "#33383D" }
inactive = { fg = "#789AA1" }

[input]
border = { fg = "#33383D" }
title = { fg = "#A1DEEA" }
value = { fg = "#DCE5E5" }
selected = { bg = "#33383D" }

[cmp]
border = { fg = "#33383D" }
active = { fg = "#DCE5E5", bg = "#33383D" }
inactive = { fg = "#789AA1" }

[tasks]
border = { fg = "#33383D" }
hovered = { fg = "#DCE5E5", bg = "#1F2428" }

[help]
on = { fg = "#5FC878" }
run = { fg = "#B895DE" }
desc = { fg = "#B8D3D5" }
hovered = { bg = "#1F2428" }
footer = { fg = "#789AA1", bg = "#181A1C" }

