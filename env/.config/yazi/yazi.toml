[mgr]
ratio          = [ 1, 4, 3 ]
sort_by        = "natural"
sort_sensitive = false
sort_reverse 	 = false
sort_dir_first = true
sort_translit  = false
linemode       = "none"
show_hidden    = false
show_symlink   = true
scrolloff      = 99
mouse_events   = [ "click", "scroll" ]
title_format   = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 600
max_height      = 900
cache_dir       = ""
image_delay     = 30
image_filter    = "lanczos3"
image_quality   = 85
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
edit = [
    { run = "nvim %s",      desc = "Neovim",    for = "unix", block = true },
]
img = [
    { run = "ristretto %s1", desc = "Ristretto", for = "linux", orphan = true },
    { run = "gimp %s1",      desc = "GIMP",      for = "linux", orphan = true },
    { run = "inkscape %s1",  desc = "Inkscape",  for = "linux", orphan = true },
]
play = [
    { run = "mpv %s1",       desc = "mpv",      for = "linux", orphan = true },
    { run = "vlc %s1",       desc = "VLC",      for = "linux", orphan = true },
    { run = "mediainfo %s1; echo 'Press enter to exit'; read _", desc = "Media info", for = "unix", block = true },
]
pdf = [
    { run = "mupdf %s1",    desc = "MuPDF",    for = "linux", orphan = true },
    { run = "evince %s1",   desc = "Evince",   for = "linux", orphan = true },
    { run = "firefox %s1",  desc = "Firefox",  for = "linux", orphan = true },
    { run = "inkscape %s1", desc = "Inkscape", for = "linux", orphan = true },
]
open = [
    { run = "xdg-open %s1", desc = "xdg-open", for = "linux" },
]
reveal = [
    { run = "xdg-open %d1",  desc = "Reveal",  for = "linux" },
]
extract = [
    { run = "ya pub extract --list %s", desc = "Extract here" },
]
download = [
    { run = "ya emit download --open %S", desc = "Download and open" },
    { run = "ya emit download %S",        desc = "Download" },
]

[open]
rules = [
    # Image
    { mime = "image/*",          use = [ "img", "gimp" ] },
    # Video / Audio
    { mime = "{audio,video}/*",  use = [ "play", "reveal" ] },
    # PDF
    { mime = "application/pdf",  use = [ "pdf", "reveal" ] },
    # Code / Text
    { mime = "text/*",           use = [ "edit", "reveal" ] },
    { mime = "*/javascript",     use = [ "edit", "reveal" ] },
    # Archive
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
    # JSON / structured data
    { mime = "application/{json,ndjson}", use = [ "edit", "reveal" ] },
    # Empty file
    { mime = "inode/empty",      use = [ "edit", "reveal" ] },
    # Virtual file system
    { mime = "vfs/{absent,stale}", use = "download" },
    # Fallback
    { url = "*",                 use = [ "open", "reveal" ] },
]

[tasks]
micro_workers    = 10
macro_workers    = 10
bizarre_retry    = 3
image_alloc      = 536870912  # 512MB
image_bound      = [ 10000, 10000 ]
suppress_preload = true

[plugin]
fetchers = [
    { id = "mime", url = "*/",         run = "mime.dir",    prio = "high", group = "mime" },
    { id = "mime", url = "local://*",  run = "mime.local",  prio = "high", group = "mime" },
    { id = "mime", url = "remote://*", run = "mime.remote", prio = "high", group = "mime" },
]

spotters = [
    { url = "*/", run = "folder" },
    # Code
    { mime = "text/*", run = "code" },
    { mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
    # Image
    { mime = "image/{avif,hei?,jxl}", run = "magick" },
    { mime = "image/svg+xml", run = "svg" },
    { mime = "image/*", run = "image" },
    # Video
    { mime = "video/*", run = "video" },
    # Virtual file system
    { mime = "vfs/*", run = "vfs" },
    # Error
    { mime = "null/*", run = "null" },
    # Fallback
    { url = "*", run = "file" },
]
preloaders = [
    # Image
    { mime = "image/{avif,hei?,jxl}", run = "magick" },
    { mime = "image/svg+xml", run = "svg" },
    { mime = "image/*", run = "image" },
    # Video
    { mime = "video/*", run = "video" },
    # PDF
    { mime = "application/pdf", run = "pdf" },
    # Font
    { mime = "font/*", run = "font" },
    { mime = "application/ms-opentype", run = "font" },
]
previewers = [
    { url = "*/", run = "folder" },
    # Code
    { mime = "text/*", run = "code" },
    { mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
    # JSON
    { mime = "application/{json,ndjson}", run = "json" },
    # Image
    { mime = "image/{avif,hei?,jxl}", run = "magick" },
    { mime = "image/svg+xml", run = "svg" },
    { mime = "image/*", run = "image" },
    # Video
    { mime = "video/*", run = "video" },
    # PDF
    { mime = "application/pdf", run = "pdf" },
    # Archive
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
    { mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
    { url = "*.{AppImage,appimage}", run = "archive" },
    # Virtual Disk / Disk Image
    { mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
    { mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
    { url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
    # Font
    { mime = "font/*", run = "font" },
    { mime = "application/ms-opentype", run = "font" },
    # Empty file
    { mime = "inode/empty", run = "empty" },
    # Virtual file system
    { mime = "vfs/*", run = "vfs" },
    # Error
    { mime = "null/*", run = "null" },
    # Fallback
    { url = "*", run = "file" },
]

[input]
cursor_blink = false

# cd
cd_title  = "Change directory:"
cd_origin = "top-center"
cd_offset = [ 0, 2, 50, 3 ]

# create
create_title  = [ "Create:", "Create (dir):" ]
create_origin = "top-center"
create_offset = [ 0, 2, 50, 3 ]

# rename
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]

# filter
filter_title  = "Filter:"
filter_origin = "top-center"
filter_offset = [ 0, 2, 50, 3 ]

# find
find_title  = [ "Find next:", "Find previous:" ]
find_origin = "top-center"
find_offset = [ 0, 2, 50, 3 ]

# search
search_title  = "Search via {n}:"
search_origin = "top-center"
search_offset = [ 0, 2, 50, 3 ]

# shell
shell_title  = [ "Shell:", "Shell (block):" ]
shell_origin = "top-center"
shell_offset = [ 0, 2, 50, 3 ]

[confirm]
# trash
trash_title 	= "Trash {n} selected file{s}?"
trash_origin	= "center"
trash_offset	= [ 0, 0, 70, 20 ]

# delete
delete_title 	= "Permanently delete {n} selected file{s}?"
delete_origin	= "center"
delete_offset	= [ 0, 0, 70, 20 ]

# overwrite
overwrite_title  = "Overwrite file?"
overwrite_body   = "Will overwrite the following file:"
overwrite_origin = "center"
overwrite_offset = [ 0, 0, 50, 15 ]

# quit
quit_title  = "Quit?"
quit_body   = "Are you sure you want to quit Yazi?"
quit_origin = "center"
quit_offset = [ 0, 0, 50, 15 ]

[pick]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [ 0, 1, 50, 7 ]

[which]
sort_by      	 = "none"
sort_sensitive = false
sort_reverse 	 = false
sort_translit  = false
