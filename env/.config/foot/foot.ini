font=JetBrainsMono:size=13
shell=/usr/bin/tmux new-session -A -s master

[scrollback]
lines=0

[mouse]
hide-when-typing=yes

[colors]
background=181A1C
foreground=E9F2F2

regular0=131618
regular1=E0617A
regular2=8FCF7A
regular3=D9CC58
regular4=A5E9F5
regular5=D78CF0
regular6=46C2A8
regular7=E9F2F2

bright0=33383C
bright1=F1738D
bright2=9FDC8A
bright3=E6D667
bright4=B7F2FC
bright5=E39AF8
bright6=5FD3BA
bright7=F5FAFA

flash=D9CC58

cursor=181A1C E9F2F2 

[cursor]
style=block
blink=no

[url]
launch=xdg-open ${url}

[key-bindings]
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
prompt-prev=none
prompt-next=none
unicode-input=none
show-urls-launch=none
regex-launch=none
regex-copy=none
scrollback-up-page=none
scrollback-up-half-page=none
scrollback-up-line=none
scrollback-down-page=none
scrollback-down-half-page=none
scrollback-down-line=none
scrollback-home=none
scrollback-end=none
primary-paste=none
search-start=none
spawn-terminal=none
minimize=none
maximize=none
fullscreen=none
pipe-visible=none
pipe-scrollback=none
pipe-selected=none
pipe-command-output=none
show-urls-copy=none
show-urls-persistent=none
color-theme-switch-1=none
color-theme-switch-2=none
color-theme-toggle=none
noop=none
quit=none

[search-bindings]
clipboard-paste=none
find-prev=none
find-next=none
delete-next=none
cancel=none
commit=none
cursor-left=none
cursor-left-word=none
cursor-right=none
cursor-right-word=none
cursor-home=none
cursor-end=none
delete-prev=BackSpace
delete-prev-word=none
delete-next-word=none
delete-to-start=none
delete-to-end=none
extend-char=none
extend-to-word-boundary=none
extend-to-next-whitespace=none
extend-line-down=none
extend-backward-char=none
extend-backward-to-word-boundary=none
extend-backward-to-next-whitespace=none
extend-line-up=none
primary-paste=none
unicode-input=none
scrollback-up-page=none
scrollback-up-half-page=none
scrollback-up-line=none
scrollback-down-page=none
scrollback-down-half-page=none
scrollback-down-line=none
scrollback-home=none
scrollback-end=none

[url-bindings]
cancel=none
toggle-url-visible=none
