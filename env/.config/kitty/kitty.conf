include ~/.config/colors/current/kitty.conf

# font_family IoskeleyMonoTerm Nerd Font
font_family CommitMono20
bold_font CommitMono20
italic_font CommitMono20 Italic
bold_italic_font CommitMono20 Italic
font_size 12.0
disable_ligatures always 

# Nerd Fonts v3.4.0
symbol_map U+23fb-U+23fe,U+2665,U+26a1,U+2b58,U+e000-U+e00a,U+e0a0-U+e0a2,U+e0a3,U+e0b0-U+e0b3,U+e0b4-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ea60-U+ec1e,U+ed00-U+efce,U+f000-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

window_padding_width 0 160 0 160

cursor_shape block 
cursor_blink_interval 0

scrollback_lines 2000
scrollbar never
wheel_scroll_multiplier 5.0
pixel_scroll true

mouse_hide_wait 3.0
copy_on_select no
select_by_word_characters @-./_~?&=%+#
click_interval -1.0

repaint_delay 0
input_delay 0
sync_to_monitor yes

enable_audio_bell no

remember_window_size  yes
enabled_layouts *           
window_border_width 0      
placement_strategy center 
hide_window_decorations yes

shell .                              
editor .                            
shell_integration enabled          
allow_hyperlinks yes                 

clear_all_shortcuts yes  
map kitty_mod+equal  change_font_size all +0.5
map kitty_mod+minus  change_font_size all -0.5
map kitty_mod+backspace change_font_size all 0
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard
map kitty_mod+e open_url_with_hints

confirm_os_window_close 0
shell sh -c "tmux new-session -A -s master"
