# general
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"
set -gq allow-passthrough on
set -s escape-time 0
set -g status-position bottom # status on top
set -g mouse on # mouse suport :?
set -g base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g mode-keys vi
set -g focus-events on

# Kill window without confirmation
unbind q
unbind &
unbind C-d
unbind v

# binds
bind -n M-p previous-window
bind -n M-n next-window
bind -n M-q kill-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
# move between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind x kill-pane
# copy
bind -n M-v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
# new window
bind -n M-t new-window -c "#{pane_current_path}"
# sessions
bind-key -r f run-shell "tmux neww ~/.local/scripts/tmux-sessionizer"
# looks 121212 old bg
set -g status-justify left
set -g status-style "fg=#33364a,bg=#1a1d23" 
set -g pane-border-style "fg=#33364a"
set -g pane-active-border-style "fg=#1a1d23"
set -g message-style "fg=#e0def4,bg=#1a1d23,bold"
set -g message-command-style "fg=#e0def4,bg=#1a1d23,bold"
set -g mode-style "fg=#e0def4,bg=#33364a"

set -g window-status-separator ""
set -g window-status-style "fg=#33364a"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W* "
set -g window-status-current-style "fg=#e0def4,bold"

set -g status-left ""
set -g status-right "#[fg=#e0def4,bold] #S"

setw -g clock-mode-colour "#33364a"
